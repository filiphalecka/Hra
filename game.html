// ── localStorage helpers ──────────────────────────────────────
function lsGet(k){try{const v=localStorage.getItem(k);return v?JSON.parse(v):null;}catch{return null;}}
function lsSet(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}

// ── Stripe redirect handlers ──────────────────────────────────
(function handleStripeReturn(){
  const params = new URLSearchParams(window.location.search);
  if(params.get('stripe_success')==='1'){
    const sess=lsGet('hps:session');
    if(sess&&sess.uid){const paid=lsGet('hps:paid_users')||{};paid[sess.uid]=true;lsSet('hps:paid_users',paid);}
    window.history.replaceState({},'',window.location.pathname);
  }
  const handleLicense=(param,storageKey)=>{
    const val=params.get(param);
    if(val){
      const store=lsGet(storageKey)||{};
      store[val.toLowerCase()]={licensed:true,ts:Date.now()};
      lsSet(storageKey,store);
      window.history.replaceState({},'',window.location.pathname);
    }
  };
  handleLicense('city_licensed',   'hps:licensed_cities');
  handleLicense('region_licensed', 'hps:licensed_regions');
  handleLicense('state_licensed',  'hps:licensed_states');
  handleLicense('global_licensed', 'hps:licensed_global');
})();

// ── Firebase DB REST ──────────────────────────────────────────
const DB={
  getToken(){const s=lsGet('hps:session');return s?s.idToken:null;},
  async _get(path){
    const tok=this.getToken();
    const r=await fetch(FB_DB_URL+'/'+path+'.json'+(tok?'?auth='+tok:''));
    return await r.json();
  },
  async _put(path,data){
    const tok=this.getToken();
    await fetch(FB_DB_URL+'/'+path+'.json'+(tok?'?auth='+tok:''),{
      method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)});
  },
  async _patch(path,data){
    const tok=this.getToken();
    await fetch(FB_DB_URL+'/'+path+'.json'+(tok?'?auth='+tok:''),{
      method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)});
  },
  async getPlayers(){
    if(USE_FIREBASE){try{return(await this._get('players'))||{};}catch{}}
    return lsGet('hps:players')||{};
  },
  async getTeams(){
    if(USE_FIREBASE){try{return(await this._get('teams'))||{};}catch{}}
    return lsGet('hps:teams')||{};
  },
  async getBigGroups(){
    if(USE_FIREBASE){try{return(await this._get('biggroups'))||{};}catch{}}
    return lsGet('hps:biggroups')||{};
  },
  async getCategories(){
    // Merge default + approved custom categories from DB
    if(USE_FIREBASE){
      try{
        const custom=await this._get('categories');
        const approved=(custom||{});
        const merged=[...DEFAULT_CATEGORIES];
        Object.values(approved).filter(c=>c.approved).forEach(c=>{
          if(!merged.find(m=>m.id===c.id)) merged.push(c);
        });
        return merged;
      }catch{}
    }
    // localStorage: merge with pending approved
    const custom=lsGet('hps:categories')||{};
    const merged=[...DEFAULT_CATEGORIES];
    Object.values(custom).filter(c=>c.approved).forEach(c=>{
      if(!merged.find(m=>m.id===c.id)) merged.push(c);
    });
    return merged;
  },
  async getPendingCategories(){
    if(USE_FIREBASE){try{const d=await this._get('categories');return Object.values(d||{}).filter(c=>!c.approved);}catch{}}
    const custom=lsGet('hps:categories')||{};
    return Object.values(custom).filter(c=>!c.approved);
  },
  async getCities(){
    if(USE_FIREBASE){try{return(await this._get('cities'))||{};}catch{}}
    return lsGet('hps:licensed_cities')||{};
  },
  async setPlayer(uid,data){
    if(USE_FIREBASE){try{await this._put('players/'+uid,data);return;}catch(e){console.warn(e);}}
    const p=lsGet('hps:players')||{};p[uid]=data;lsSet('hps:players',p);
  },
  async setTeam(id,data){
    if(USE_FIREBASE){try{await this._put('teams/'+id,data);return;}catch(e){console.warn(e);}}
    const t=lsGet('hps:teams')||{};t[id]=data;lsSet('hps:teams',t);
  },
  async setBigGroup(id,data){
    if(USE_FIREBASE){try{await this._put('biggroups/'+id,data);return;}catch(e){console.warn(e);}}
    const g=lsGet('hps:biggroups')||{};g[id]=data;lsSet('hps:biggroups',g);
  },
  async setCity(key,data){
    if(USE_FIREBASE){try{await this._put('cities/'+key,data);return;}catch(e){console.warn(e);}}
    const c=lsGet('hps:licensed_cities')||{};c[key]=data;lsSet('hps:licensed_cities',c);
  },
  async submitCategoryRequest(catData){
    // catData = { id, label, types, requestedBy, ts }
    if(USE_FIREBASE){try{await this._put('categories/'+catData.id,{...catData,approved:false});return;}catch(e){console.warn(e);}}
    const c=lsGet('hps:categories')||{};c[catData.id]={...catData,approved:false};lsSet('hps:categories',c);
  },
  async approveCategory(id){
    if(USE_FIREBASE){try{await this._patch('categories/'+id,{approved:true});return;}catch(e){console.warn(e);}}
    const c=lsGet('hps:categories')||{};if(c[id])c[id].approved=true;lsSet('hps:categories',c);
  },
  async rejectCategory(id){
    if(USE_FIREBASE){try{await this._put('categories/'+id,null);return;}catch(e){console.warn(e);}}
    const c=lsGet('hps:categories')||{};delete c[id];lsSet('hps:categories',c);
  },
  onPlayers(cb){
    const load=async()=>{cb(await this.getPlayers());};load();
    if(!USE_FIREBASE)return()=>{};
    let on=true;
    const poll=async()=>{if(!on)return;await load();setTimeout(poll,6000);};
    setTimeout(poll,6000);return()=>{on=false;};
  },
  onTeams(cb){
    const load=async()=>{cb(await this.getTeams());};load();
    if(!USE_FIREBASE)return()=>{};
    let on=true;
    const poll=async()=>{if(!on)return;await load();setTimeout(poll,6000);};
    setTimeout(poll,6000);return()=>{on=false;};
  },
};

// ── Helpers ───────────────────────────────────────────────────
function genCode(){return Math.random().toString(36).substr(2,6).toUpperCase();}
function fmtDate(iso){
  const d=new Date(iso);
  return d.toLocaleDateString('sk-SK',{day:'numeric',month:'short'})+' '+
         d.toLocaleTimeString('sk-SK',{hour:'2-digit',minute:'2-digit'});
}
function authErrMsg(msg){
  const map={
    'EMAIL_EXISTS':'Tento e-mail je už registrovaný.',
    'INVALID_EMAIL':'Neplatný e-mail.',
    'WEAK_PASSWORD':'Heslo musí mať aspoň 6 znakov.',
    'WEAK_PASSWORD : Password should be at least 6 characters':'Heslo musí mať aspoň 6 znakov.',
    'EMAIL_NOT_FOUND':'E-mail nenájdený.',
    'INVALID_PASSWORD':'Nesprávne heslo.',
    'INVALID_LOGIN_CREDENTIALS':'Nesprávny e-mail alebo heslo.',
    'TOO_MANY_ATTEMPTS_TRY_LATER':'Príliš veľa pokusov. Skús neskôr.',
  };
  return map[msg]||msg;
}
function hasPaid(uid){const p=lsGet('hps:paid_users')||{};return !!p[uid];}
function cityThreshold(uid){return hasPaid(uid)?CITY_THRESHOLD_PAID:CITY_THRESHOLD;}
function isLicensed(storageKey,name){
  const c=lsGet(storageKey)||{};
  const k=(name||'').toLowerCase().trim();
  return !!(c[k]&&c[k].licensed);
}
function isCityLicensed(n){return isLicensed('hps:licensed_cities',n);}
function isRegionLicensed(n){return isLicensed('hps:licensed_regions',n);}
function isStateLicensed(n){return isLicensed('hps:licensed_states',n);}
function isGlobalLicensed(){
  const c=lsGet('hps:licensed_global')||{};
  return Object.values(c).some(v=>v&&v.licensed);
}
function canPlayCity(me){return(me.points||0)>=cityThreshold(me.uid)&&isCityLicensed(me.city||'');}
function canPlayRegion(me){return(me.points||0)>=REGION_THRESHOLD&&isRegionLicensed(me.region||me.city||'');}
function canPlayState(me){return(me.points||0)>=STATE_THRESHOLD&&isStateLicensed(me.country||'');}
function canPlayGlobal(me){return(me.points||0)>=GLOBAL_THRESHOLD&&isGlobalLicensed();}
function pct(val,max){return Math.min(100,Math.round((val/max)*100));}
function isAdmin(me){return me&&me.email===ADMIN_EMAIL;}

// ── Base components ───────────────────────────────────────────
function Inp({val,set,ph,type='text',onEnter,mono,mb0}){
  const[f,setF]=useState(false);
  return R('input',{type,value:val,onChange:e=>set(e.target.value),placeholder:ph,
    onKeyDown:e=>e.key==='Enter'&&onEnter&&onEnter(),
    onFocus:()=>setF(true),onBlur:()=>setF(false),
    style:{...S.inp,...(f?{borderColor:'rgba(250,245,239,0.45)'}:{}),
      ...(mono?{fontFamily:"'DM Mono',monospace",letterSpacing:'.1em'}:{}),
      ...(mb0?{marginBottom:0}:{})}});
}
function Sel({val,set,opts,ph}){
  return R('select',{value:val,onChange:e=>set(e.target.value),style:S.sel},
    R('option',{value:''},ph||'— Vyber —'),
    opts.map(o=>typeof o==='string'
      ?R('option',{key:o,value:o},o)
      :R('option',{key:o.value,value:o.value},o.label)));
}
function Btn({onClick,children,v='p',full,s,busy}){
  const base=v==='p'?S.btnP:v==='s'?S.btnS:v==='g'?S.btnG:v==='link'?S.btnLink:S.btnM;
  return R('button',{onClick,style:{...base,...(full?{width:'100%'}:{}),marginTop:0,...(s||{}),
    ...(busy?{opacity:.6,cursor:'default'}:{})}},busy?'…':children);
}
function Fl({msg}){return msg?R('div',{style:S.flash},msg):null;}
function Lbl({c}){return R('label',{style:S.lbl},c);}
function Err({m}){return m?R('div',{style:S.err},m):null;}
function Ok({m}){return m?R('div',{style:S.ok},m):null;}
function Bk({to,set,l}){return R(Btn,{onClick:()=>set(to),v:'m',s:{marginBottom:'1.5rem',fontSize:'.7rem',padding:'.45rem .85rem'}},'← '+l);}
function Divider(){return R('div',{style:{borderTop:'1px solid rgba(250,245,239,0.1)',margin:'1.25rem 0'}});}
function RankBadge({i}){
  const extra=i===0?{background:'#B8882A',borderColor:'#B8882A',color:'#1C1711',fontWeight:500}
    :i===1?{background:'rgba(200,200,200,0.18)'}
    :i===2?{background:'rgba(176,114,75,0.18)',color:'#E8A87C'}:{};
  return R('span',{style:{...S.rank,...extra}},i+1);
}

// ── Level Progress bars ───────────────────────────────────────
function LevelProgress({me,onShop}){
  const pts=me.points||0;
  const paid=hasPaid(me.uid);
  const levels=[
    {id:'city',  label:'Mesto',   thresh:cityThreshold(me.uid),can:canPlayCity(me),
      licensed:isCityLicensed(me.city||''),name:me.city||'?'},
    {id:'region',label:'Kraj',    thresh:REGION_THRESHOLD,can:canPlayRegion(me),
      licensed:isRegionLicensed(me.city||''),name:me.city||'?'},
    {id:'state', label:'Štát',    thresh:STATE_THRESHOLD, can:canPlayState(me),
      licensed:isStateLicensed(me.country||''),name:me.country||'?'},
    {id:'global',label:'Globálna',thresh:GLOBAL_THRESHOLD,can:canPlayGlobal(me),
      licensed:isGlobalLicensed(),name:'Svet'},
  ];
  // Only show up to first locked level + 1
  let showUpTo=0;
  for(let i=0;i<levels.length;i++){if(!levels[i].can){showUpTo=i;break;}showUpTo=i;}
  const visible=levels.slice(0,showUpTo+1);

  return R('div',{style:{marginBottom:'1rem'}},
    visible.map(lv=>{
      const p=pct(pts,lv.thresh);
      if(lv.can) return R('div',{key:lv.id,style:{...S.card,
        borderColor:'rgba(184,136,42,0.3)',background:'rgba(184,136,42,0.06)',marginBottom:'.5rem'}},
        R('div',{style:{fontFamily:"'DM Mono',monospace",fontSize:'.6rem',color:'#B8882A',letterSpacing:'.1em',textTransform:'uppercase'}},
          lv.label+' · '+lv.name+' ✓')
      );
      const needsInteractions=pts<lv.thresh;
      const needsLicense=!lv.licensed&&pts>=lv.thresh;
      return R('div',{key:lv.id,style:{...S.card,marginBottom:'.5rem'}},
        R('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'.4rem'}},
          R('div',{style:{fontFamily:"'DM Mono',monospace",fontSize:'.6rem',color:'rgba(250,245,239,0.35)',letterSpacing:'.1em',textTransform:'uppercase'}},
            lv.label+(lv.name&&lv.name!=='?'?' · '+lv.name:'')),
          R('div',{style:{fontFamily:"'DM Mono',monospace",fontSize:'.65rem',color:needsLicense?'#B8882A':'rgba(250,245,239,0.3)'}},
            needsLicense?'potrebná licencia!':(pts+' / '+lv.thresh))
        ),
        needsInteractions&&R('div',{style:S.progress},R('div',{style:{...S.progressFill,width:p+'%'}})),
        needsLicense&&R('div',null,
          R('div',{style:{fontSize:'.8rem',color:'rgba(250,245,239,0.45)',marginBottom:'.6rem',lineHeight:1.5}},
            lv.name+' ešte nemá licenciu. Kúp ju a odomkni pre všetkých.'),
          R(Btn,{onClick:onShop,v:'g',full:true,s:{padding:'.6rem'}},'🏙️ Kúpiť licenciu')
        ),
        lv.id==='city'&&needsInteractions&&!paid&&R('div',{style:{marginTop:'.5rem'}},
          R(Btn,{onClick:()=>{window.location.href=STRIPE_PAYMENT_LINK+'?client_reference_id='+(me.uid||'anon');},
            v:'m',full:true,s:{fontSize:'.7rem'}},'Skrátiť prah (platba)')
        )
      );
    })
  );
}

// ── Request New Category screen ───────────────────────────────
function RequestCategory({me,onBack,onSubmitted}){
  const[label,setLabel]=useState('');
  const[types,setTypes]=useState('');
  const[busy,setBusy]=useState(false);
  const[done,setDone]=useState(false);
  const[err,setErr]=useState('');
  async function doSubmit(){
    if(!label.trim()){setErr('Zadaj názov kategórie.');return;}
    setBusy(true);
    try{
      const id='cat_'+Date.now();
      const typesArr=types.split(',').map(s=>s.trim()).filter(Boolean);
      await DB.submitCategoryRequest({
        id,label:label.trim(),types:typesArr,
        requestedBy:me.uid,requestedByEmail:me.email,
        ts:new Date().toISOString(),approved:false
      });
      setDone(true);
      setTimeout(()=>onSubmitted&&onSubmitted(),2000);
    }catch(e){setErr('Chyba: '+e.message);}
    finally{setBusy(false);}
  }
  if(done)return R('div',null,
    R(Bk,{to:'team',set:onBack,l:'Späť'}),
    R('div',{style:{...S.card,borderColor:'rgba(184,136,42,0.3)',background:'rgba(184,136,42,0.07)'}},
      R('div',{style:{fontFamily:"'DM Mono',monospace",fontSize:'.7rem',color:'#B8882A'}},'Návrh odoslaný!'),
      R('div',{style:{fontSize:'.85rem',color:'rgba(250,245,239,0.6)',marginTop:'.5rem'}},'Admin kategóriu schváli čo najskôr.')
    )
  );
  return R('div',null,
    R(Bk,{to:'team',set:onBack,l:'Späť'}),
    R('div',{style:S.eye},'Navrhnúť novú kategóriu'),
    R('h3',{style:{...S.h,fontSize:'1.6rem'}},'Nová ',R('em',{style:S.hEm},'kategória')),
    R('div',{style:{...S.card}},
      R(Lbl,{c:'Názov kategórie (napr. Skauting, Školstvo...)'}),
      R(Inp,{val:label,set:setLabel,ph:'napr. Tanec'}),
      R(Lbl,{c:'Typy skupín, oddelené čiarkou (nepovinné)'}),
      R(Inp,{val:types,set:setTypes,ph:'napr. Súbor, Škola, Klub',mb0:true}),
      R('div',{style:{fontSize:'.75rem',color:'rgba(250,245,239,0.35)',marginBottom:'1rem',marginTop:'.5rem',lineHeight:1.6}},
        'Admin schváli návrh. Dostaneš upozornenie keď bude aktívna.'),
      R(Err,{m:err}),
      R(Btn,{onClick:doSubmit,v:'p',full:true,busy},'Odoslať návrh')
    )
  );
}

  // ── ENCOUNTER ─────────────────────────────────────────────
  async function doEncounter(){
    if(!note.trim()){setNe('Napíš aspoň pár slov.');return;}
    setBusy(true);
    try{
      const pl=await DB.getPlayers(),tm=await DB.getTeams();
      const uid=me.uid;
      const enc={note:note.trim(),date:new Date().toISOString(),level:playLevel,
        teamId:activeTeamId||null,city:me.city||'',country:me.country||''};
      const prevPts=pl[uid].points||0;
      const p={...pl[uid],points:prevPts+1,encounters:[enc,...(pl[uid].encounters||[]).slice(0,49)]};
      await DB.setPlayer(uid,p);

      // Cascade — points flow up through all parent biggroups
      if((playLevel==='team'||playLevel==='city')&&activeTeamId&&tm[activeTeamId]){
        await DB.setTeam(activeTeamId,{...tm[activeTeamId],points:(tm[activeTeamId].points||0)+1});
        // Walk up biggroup parent chain
        if(tm[activeTeamId].bigGroupId){
          const bg=await DB.getBigGroups();
          let curId=tm[activeTeamId].bigGroupId;
          while(curId&&bg[curId]){
            await DB.setBigGroup(curId,{...bg[curId],points:(bg[curId].points||0)+1});
            curId=bg[curId].parentId||null;
          }
        }
      }

      // Milestone check
      const milestones=[
        {thresh:cityThreshold(me.uid),msg:'Mestská úroveň odomknutá! 🏙️'},
        {thresh:REGION_THRESHOLD,msg:'Krajská úroveň odomknutá! 🗺️'},
        {thresh:STATE_THRESHOLD,msg:'Štátna úroveň odomknutá! 🇸🇰'},
        {thresh:GLOBAL_THRESHOLD,msg:'Globálna úroveň odomknutá! 🌍'},
      ];
      const milestone=milestones.find(m=>prevPts<m.thresh&&(prevPts+1)>=m.thresh);

      await refreshAll();
      setNote('');setNe('');
      if(milestone)shFlash(milestone.msg);
      else shFlash('Stretnutie zaznamenané! +1 bod');
      setScr('home');
    }finally{setBusy(false);}
  }

  // Join a biggroup into a parent biggroup (by code)
  async function doJoinParentGroup(bgId){
    const code=bgParentCode.trim().toUpperCase();
    if(!code){setBge2('Zadaj kód nadradenej skupiny.');return;}
    setBusy(true);
    try{
      const bg=await DB.getBigGroups();
      const parent=Object.values(bg).find(g=>g.code===code);
      if(!parent){setBge2('Skupina nenájdená.');setBusy(false);return;}
      if(parent.id===bgId){setBge2('Skupina nemôže byť rodičom samej seba.');setBusy(false);return;}
      // Check for circular reference
      let cur=parent;
      while(cur&&cur.parentId){
        if(cur.parentId===bgId){setBge2('Cyklická závislosť — táto skupina je už nadradená.');setBusy(false);return;}
        cur=bg[cur.parentId];
      }
      await DB.setBigGroup(bgId,{...bg[bgId],parentId:parent.id});
      await refreshAll();
      setBgParentCode('');setBge2('');shFlash('Skupina zaradená do '+parent.name+'!');
    }finally{setBusy(false);}
  }

          'Veľká skupina združuje malé skupiny rovnakého typu. Môžeš vytvoriť novú alebo sa pripojiť ku existujúcej kódom.'),
        R('div',{style:{display:'flex',borderBottom:'1px solid rgba(250,245,239,0.1)',marginBottom:'1.25rem'}},
          R('button',{onClick:()=>setBgtab('create'),style:bgtab==='create'?S.tabA:S.tab},'Vytvoriť novú'),
          R('button',{onClick:()=>setBgtab('join'),style:bgtab==='join'?S.tabA:S.tab},'Pripojiť kódom')
        ),
        bge&&R(Err,{m:bge}),
        bgtab==='create'?R('div',{style:S.card},
          R(Lbl,{c:'Názov'}),
          R(Inp,{val:bgName,set:setBgName,ph:'napr. Oddiel sv. Juraja'}),
          R(CategoryPicker,{categories,selectedCat:bgCat,selectedType:bgType,
            onCat:setBgCat,onType:setBgType,onRequestNew:()=>setScr('reqcat')}),
          R(Btn,{onClick:()=>doCreateBigGroup(teamId),v:'p',full:true,busy,s:{marginTop:'1rem'}},'Vytvoriť')
        ):R('div',{style:S.card},
          R(Lbl,{c:'Kód skupiny'}),
          R(Inp,{val:bgCode,set:v=>setBgCode(v.toUpperCase()),ph:'napr. ZB9K2M',mono:true,mb0:true}),
          R(Btn,{onClick:()=>doJoinBigGroup(teamId),v:'p',full:true,busy,s:{marginTop:'1rem'}},'Pripojiť sa')
        )
      ),

      // ── Ak tím MÁ veľkú skupinu ──
      myBg&&R('div',null,

        // Hierarchia — strom nahor
        R('div',{style:{...S.card,marginBottom:'.75rem'}},
          R('div',{style:{...S.lbl,marginBottom:'.75rem'}},'Hierarchia skupín'),
          // Zobraz reťaz od koreňa nadol
          R('div',{style:{display:'flex',flexDirection:'column',gap:'.4rem'}},
            [...ancestors].reverse().map((g,i)=>{
              const isCurrent=g.id===myBg.id;
              return R('div',{key:g.id,style:{
                display:'flex',alignItems:'center',gap:'.5rem',
                paddingLeft:(i*1.2)+'rem'}},
                R('span',{style:{color:'rgba(250,245,239,0.2)',fontFamily:"'DM Mono',monospace",fontSize:'.7rem'}},
                  i===0?'▶':' └'),
                R('div',{style:{
                  padding:'.4rem .8rem',
                  border:'1px solid '+(isCurrent?'#C4603A':'rgba(250,245,239,0.15)'),
                  background:isCurrent?'rgba(196,96,58,0.1)':'transparent',
                  fontFamily:"'DM Mono',monospace",fontSize:'.65rem',
                  color:isCurrent?'#FAF5EF':'rgba(250,245,239,0.5)',
                  flex:1}},
                  g.name,
                  isCurrent&&R('span',{style:{marginLeft:'.5rem',color:'#C4603A'}},'← ty'),
                  R('span',{style:{marginLeft:'.5rem',opacity:.4}},'· '+g.points+' b')
                )
              );
            }),
            // Deti tejto skupiny
            children.length>0&&R('div',{style:{marginTop:'.5rem'}},
              R('div',{style:{...S.lbl,marginBottom:'.4rem'}},'Podradené skupiny ('+children.length+')'),
              children.map(c=>R('div',{key:c.id,style:{
                display:'flex',alignItems:'center',gap:'.5rem',
                paddingLeft:'1.2rem',marginBottom:'.3rem'}},
                R('span',{style:{color:'rgba(250,245,239,0.2)',fontFamily:"'DM Mono',monospace",fontSize:'.7rem'}},' └'),
                R('div',{style:{fontFamily:"'DM Mono',monospace",fontSize:'.65rem',
                  color:'rgba(250,245,239,0.45)',padding:'.35rem .7rem',
                  border:'1px solid rgba(250,245,239,0.1)',flex:1}},
                  c.name,' · ',c.points,' b')
              ))
            )
          ),
          R('div',{style:{fontFamily:"'DM Mono',monospace",fontSize:'.6rem',
            color:'rgba(250,245,239,0.28)',marginTop:'.75rem'}},
            'Kód: '+myBg.code,
            myBg.category&&' · '+myBg.category+(myBg.type?' / '+myBg.type:'')
          )
        ),

        // Pripojiť k nadradenej / odpojiť
        isFounder&&R('div',{style:{...S.card,marginBottom:'.75rem'}},
          R('div',{style:{...S.lbl,marginBottom:'.75rem'}},'Nadradená skupina'),
          parent
            ?R('div',null,
                R('div',{style:{fontSize:'.85rem',color:'rgba(250,245,239,0.7)',marginBottom:'.75rem'}},
                  'Táto skupina patrí pod: ',R('strong',null,parent.name)),
                R(Btn,{onClick:()=>doLeaveParentGroup(myBg.id),v:'m',busy,
                  s:{fontSize:'.7rem',color:'rgba(196,96,58,0.7)'}},'Odpojiť od nadradenej')
              )
            :R('div',null,
                R('div',{style:{fontSize:'.85rem',color:'rgba(250,245,239,0.5)',marginBottom:'.75rem',lineHeight:1.6}},
                  'Táto skupina zatiaľ nie je zaradená do vyššej skupiny. Zadaj kód nadradenej skupiny (napr. zboru).'),
                bge2&&R(Err,{m:bge2}),
                R(Lbl,{c:'Kód nadradenej skupiny'}),
                R(Inp,{val:bgParentCode,set:v=>setBgParentCode(v.toUpperCase()),
                  ph:'napr. ZB9K2M',mono:true,mb0:true}),
                R(Btn,{onClick:()=>doJoinParentGroup(myBg.id),v:'p',full:true,busy,
                  s:{marginTop:'1rem'}},'Zaradiť do nadradenej')
              )
        ),

        // Info pre ne-zakladateľov
        !isFounder&&R('div',{style:{...S.card,marginBottom:'.75rem'}},
          R('div',{style:{fontFamily:"'DM Mono',monospace",fontSize:'.65rem',color:'rgba(250,245,239,0.35)',letterSpacing:'.1em',textTransform:'uppercase'}}),
          R('div',{style:{fontSize:'.85rem',color:'rgba(250,245,239,0.5)'}},'Hierarchiu môže spravovať len zakladateľ skupiny.')
        )
      )
    );
  }

  // ══ SPRÁVA VEĽKEJ SKUPINY ════════════════════════════════
  if(scr&&scr.startsWith('manage_bg_')){
    const bgId=scr.replace('manage_bg_','');
    const bg=bigGroups[bgId];
    if(!bg) return R('div',null,R(Bk,{to:'team',set:setScr,l:'Späť'}),R('div',{style:S.err},'Skupina nenájdená.'));

    const isFounder=bg.founderId===me.uid;
    const isMember=(bg.members||[]).includes(me.uid)||
      (bg.teamIds||[]).some(tid=>(teams[tid]&&(teams[tid].members||[]).includes(me.uid)));
    const parent=bg.parentId?bigGroups[bg.parentId]:null;

    // Build full ancestor chain
    function getChain(id){
      const chain=[];let cur=id;
      while(cur&&bigGroups[cur]){chain.push(bigGroups[cur]);cur=bigGroups[cur].parentId||null;}
      return chain;
    }
    const chain=getChain(bgId);
    const children=Object.values(bigGroups).filter(g=>g.parentId===bgId);
    const childTeams=(bg.teamIds||[]).map(id=>teams[id]).filter(Boolean);

    // Geographic level this biggroup unlocks at
    const geoLevels=[
      {label:'Vždy aktívne',min:0},
      {label:'Vždy aktívne',min:0},
      {label:'Odomkne sa s mestom',min:50},
      {label:'Odomkne sa s krajom',min:100},
      {label:'Odomkne sa so štátom',min:150},
      {label:'Odomkne sa s globálnou',min:200},
    ];

    return R('div',null,
      R(Bk,{to:'team',set:setScr,l:'Späť'}),
      R(Fl,{msg:flash}),
      R('div',{style:S.eye},'Správa skupiny'),
      R('h3',{style:{...S.h,fontSize:'1.6rem'}},bg.name),
      R('div',{style:{fontFamily:"'DM Mono',monospace",fontSize:'.6rem',
        color:'rgba(250,245,239,0.35)',marginBottom:'1.5rem',letterSpacing:'.08em'}},
        bg.category+(bg.type?' · '+bg.type:'')+' · Kód: ',
        R('strong',{style:{color:'#B8882A',letterSpacing:'.15em'}},bg.code),
        ' · '+bg.points+' bodov'
      ),

      // Hierarchia
      R('div',{style:{...S.card,marginBottom:'.75rem'}},
        R(Lbl,{c:'Hierarchia'}),
        R('div',{style:{display:'flex',flexDirection:'column',gap:'.35rem'}},
          [...chain].reverse().map((g,i)=>{
            const isCur=g.id===bgId;
            return R('div',{key:g.id,
              style:{display:'flex',alignItems:'center',gap:'.5rem',paddingLeft:(i*1.25)+'rem',cursor:isCur?'default':'pointer'},
              onClick:()=>!isCur&&setScr('manage_bg_'+g.id)},
              R('span',{style:{fontFamily:"'DM Mono',monospace",fontSize:'.7rem',
                color:'rgba(250,245,239,0.2)',flexShrink:0}},i===0?'◆':' └'),
              R('div',{style:{
                padding:'.35rem .75rem',flex:1,
                border:'1px solid '+(isCur?'#C4603A':'rgba(250,245,239,0.12)'),
                background:isCur?'rgba(196,96,58,0.1)':'rgba(250,245,239,0.03)',
                fontFamily:"'DM Mono',monospace",fontSize:'.65rem',
                color:isCur?'#FAF5EF':'rgba(250,245,239,0.5)'}},
                g.name,
                !isCur&&R('span',{style:{marginLeft:'.4rem',fontSize:'.55rem',color:'rgba(250,245,239,0.25)'}},'→ otvoriť'),
                R('span',{style:{marginLeft:'.5rem',opacity:.35}},'· '+g.points+' b')
              )
            );
          }),
          // Podradené skupiny
          children.length>0&&children.map(c=>R('div',{key:c.id,
            style:{display:'flex',alignItems:'center',gap:'.5rem',
              paddingLeft:(chain.length*1.25)+'rem',cursor:'pointer'},
            onClick:()=>setScr('manage_bg_'+c.id)},
            R('span',{style:{fontFamily:"'DM Mono',monospace",fontSize:'.7rem',
              color:'rgba(250,245,239,0.15)',flexShrink:0}},' └'),
            R('div',{style:{padding:'.35rem .75rem',flex:1,
              border:'1px solid rgba(250,245,239,0.08)',
              fontFamily:"'DM Mono',monospace",fontSize:'.65rem',
              color:'rgba(250,245,239,0.38)'}},
              c.name,' · ',c.points,' b',
              R('span',{style:{marginLeft:'.4rem',fontSize:'.55rem',color:'rgba(250,245,239,0.25)'}},'→ otvoriť')
            )
          )),
          // Malé skupiny (tímy)
          childTeams.length>0&&R('div',{style:{marginTop:'.25rem'}},
            childTeams.map(t=>R('div',{key:t.id,
              style:{display:'flex',alignItems:'center',gap:'.5rem',
                paddingLeft:(chain.length*1.25)+'rem',marginTop:'.25rem'}},
              R('span',{style:{fontFamily:"'DM Mono',monospace",fontSize:'.7rem',
                color:'rgba(250,245,239,0.1)',flexShrink:0}},' └'),
              R('div',{style:{padding:'.25rem .6rem',
                border:'1px dashed rgba(250,245,239,0.08)',
                fontFamily:"'DM Mono',monospace",fontSize:'.6rem',
                color:'rgba(250,245,239,0.25)'}},
                '👥 '+t.name+' · '+(t.members||[]).length+' členov')
            ))
          )
        )
      ),

      // Pripojiť k nadradenej (len zakladateľ)
      isFounder&&R('div',{style:{...S.card,marginBottom:'.75rem'}},
        R(Lbl,{c:parent?'Nadradená skupina':'Pripojiť k nadradenej'}),
        parent
          ?R('div',null,
              R('div',{style:{fontSize:'.85rem',color:'rgba(250,245,239,0.65)',marginBottom:'.75rem'}},
                bg.name,' patrí pod ',
                R('span',{style:{color:'#FAF5EF',fontWeight:500}},parent.name)),
              R('div',{style:{display:'flex',gap:'.5rem'}},
                R(Btn,{onClick:()=>setScr('manage_bg_'+parent.id),v:'m',
                  s:{fontSize:'.7rem'}},'Otvoriť '+parent.name),
                R(Btn,{onClick:()=>doLeaveParentGroup(bgId),v:'m',busy,
                  s:{fontSize:'.7rem',color:'rgba(196,96,58,0.6)'}},'Odpojiť')
              )
            )
          :R('div',null,
              R('div',{style:{fontSize:'.85rem',color:'rgba(250,245,239,0.45)',
                marginBottom:'.75rem',lineHeight:1.6}},
                'Zadaj kód nadradenej skupiny (napr. zboru alebo oblasti).'),
              bge2&&R(Err,{m:bge2}),
              R(Lbl,{c:'Kód nadradenej skupiny'}),
              R(Inp,{val:bgParentCode,set:v=>setBgParentCode(v.toUpperCase()),
                ph:'napr. ZB9K2M',mono:true,mb0:true}),
              R(Btn,{onClick:()=>doJoinParentGroup(bgId),v:'p',full:true,busy,
                s:{marginTop:'1rem'}},'Zaradiť do nadradenej')
            )
      ),

      // Opustiť skupinu (pre členov čo nie sú zakladatelia)
      !isFounder&&isMember&&R('div',{style:{...S.card,marginBottom:'.75rem'}},
        R(Lbl,{c:'Členstvo'}),
        R('div',{style:{fontSize:'.85rem',color:'rgba(250,245,239,0.5)',marginBottom:'.75rem'}},'Si členom tejto skupiny.'),
        R(Btn,{onClick:()=>doLeaveBigGroupDirect(bgId),v:'m',busy,
          s:{color:'rgba(196,96,58,0.6)',fontSize:'.75rem'}},'Opustiť skupinu')
      )
    );
  }

  // ══ HOME ═════════════════════════════════════════════════
  if(scr==='home')return R('div',null,
    R(Fl,{msg:flash}),
    R('div',{style:{display:'flex',alignItems:'flex-start',justifyContent:'space-between',marginBottom:'1.5rem'}},
      R('div',null,
        R('div',{style:{...S.eye,marginBottom:'.2rem'}},'Ahoj'),
        R('h3',{style:{...S.h,fontSize:'2rem',marginBottom:'.2rem'}},me.nickname),
        R('div',{style:{fontFamily:"'DM Mono',monospace",fontSize:'.6rem',color:'rgba(250,245,239,0.3)',marginBottom:'.25rem'}},
          me.city+(me.country?', '+me.country:'')),
        myTeams.length>0&&R('div',{style:{display:'flex',flexWrap:'wrap',gap:'.3rem'}},
          myTeams.map(t=>R('span',{key:t.id,style:{
            ...S.badgeA,cursor:'pointer',
            ...(activeTeamId!==t.id?{background:'rgba(139,46,20,0.4)'}:{})},
            onClick:()=>setActiveTeamId(t.id),title:'Klikni pre výber'},t.name))
        )
      ),
      R('div',{style:{display:'flex',flexDirection:'column',alignItems:'flex-end',gap:'.5rem'}},
        isAdmin(me)&&R(Btn,{onClick:()=>window.location.href='admin.html',v:'m',
          s:{fontSize:'.6rem',padding:'.3rem .7rem',borderColor:'rgba(184,136,42,0.4)',color:'#B8882A'}},'⚙ Admin'),
        R('div',{style:{display:'flex',gap:'.4rem',alignItems:'center'}},
          fbBadge,
          R(Btn,{onClick:doLogout,v:'m',s:{padding:'.3rem .7rem',fontSize:'.6rem'}},'Odhlásiť')))
    ),
    R('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:'.75rem',marginBottom:'1.5rem'}},
      R('div',{style:S.stat},R('div',{style:S.statN},me.points||0),R('div',{style:S.statL},'Moje body')),
      R('div',{style:S.stat},R('div',{style:S.statN},myActiveTeam?myActiveTeam.points||0:'—'),R('div',{style:S.statL},'Malá skupina')),
      R('div',{style:S.stat},R('div',{style:S.statN},myTeams.length||0),R('div',{style:S.statL},'Moje skupiny'))
    ),
    // Cascade
    R('div',{style:{...S.card,marginBottom:'1.25rem'}},
      R('div',{style:{...S.lbl,marginBottom:'.6rem'}},'Postup'),
      R('div',{style:S.cascade},
        R('div',{style:S.cna},'Solo'),
        R('div',{style:S.arr},'→'),
        myTeams.length>0?R('div',{style:S.cna},myActiveTeam?myActiveTeam.name:'Malá sk.')
          :R('div',{style:{...S.cn,cursor:'pointer'},onClick:()=>setScr('team')},'+ Malá sk.'),
        R('div',{style:{...S.arr,opacity:.3}},'→'),
        canPlayCity(me)?R('div',{style:S.cna},'Mesto')
          :R('div',{style:{...S.cnlock,cursor:'pointer'},onClick:()=>setScr('cityshop')},
              'Mesto '+(me.points||0)+'/'+cityThreshold(me.uid)),
        R('div',{style:{...S.arr,opacity:.25}},'→'),
        canPlayRegion(me)?R('div',{style:S.cna},'Kraj')
          :R('div',{style:{...S.cn,opacity:.5}},'Kraj'),
        R('div',{style:{...S.arr,opacity:.2}},'→'),
        R('div',{style:{...S.cn,opacity:.4}},'Štát'),
        R('div',{style:{...S.arr,opacity:.15}},'→'),
        R('div',{style:{...S.cn,opacity:.3}},'Svet')
      )
    ),
    R(LevelProgress,{me,onShop:()=>setScr('cityshop')}),
    R(Btn,{onClick:()=>setScr('log'),v:'p',full:true,s:{padding:'1rem',fontSize:'1rem',marginBottom:'.75rem'}},
      '+ Zaznamenať stretnutie'),
    R('div',{style:{display:'flex',gap:'.75rem',marginBottom:'.75rem'}},
      R(Btn,{onClick:()=>setScr('team'),v:'s',s:{flex:1}},myTeams.length>0?'Moje skupiny':'Vytvoriť skupinu'),
      R(Btn,{onClick:()=>setScr('lb'),v:'m',s:{flex:1}},'Rebríček')
    ),
    R(Btn,{onClick:()=>setScr('cityshop'),v:'m',full:true,s:{marginBottom:'1.5rem',fontSize:'.7rem'}},'🏙️ E-shop · licencie úrovní'),
    (me.encounters||[]).length>0&&R('div',null,
      R('div',{style:{...S.lbl,marginBottom:'1rem'}},'Posledné stretnutia'),
      (me.encounters||[]).slice(0,5).map((e,i)=>R('div',{key:i,style:{
        padding:'.7rem 0',borderBottom:'1px solid rgba(250,245,239,0.06)',
        fontSize:'.85rem',color:'rgba(250,245,239,0.72)'}},
        R('div',null,e.note),
        R('div',{style:{fontFamily:"'DM Mono',monospace",fontSize:'.6rem',color:'rgba(250,245,239,0.28)',marginTop:'.2rem'}},
          fmtDate(e.date),e.level&&e.level!=='solo'&&R('span',{style:{marginLeft:'.5rem',color:'#C4603A'}},'· '+e.level))))
    )
  );

  // ══ LOG ══════════════════════════════════════════════════
  if(scr==='log')return R('div',null,
    R(Bk,{to:'home',set:setScr,l:'Späť'}),
    R('div',{style:S.eye},'Nové stretnutie'),
    R('h3',{style:{...S.h,fontSize:'1.6rem'}},'Koho si dnes ',R('em',{style:S.hEm},'stretol?')),
    R('div',{style:S.card},
      R(LevelPicker,{selected:playLevel,onSelect:setPlayLevel,me,myTeams,activeTeamId,onTeamChange:setActiveTeamId}),
      R(Divider,null),
      R(Lbl,{c:'Pár slov o stretnutí'}),
      R('textarea',{rows:4,value:note,onChange:e=>setNote(e.target.value),
        placeholder:'napr. „Oslovil som chlapíka v kaviarni…"',
        style:{...S.inp,resize:'vertical',lineHeight:1.6}}),
      ne&&R(Err,{m:ne}),
      R('div',{style:{display:'flex',gap:'.5rem',flexWrap:'wrap',margin:'.75rem 0'}},
        R('span',{style:S.badgeA},'+1 · '+me.nickname),
        (playLevel==='team'||playLevel==='city')&&myActiveTeam&&R('span',{style:S.badgeG},'+1 · '+myActiveTeam.name),
        playLevel==='city'&&R('span',{style:S.badgeG},'+1 · '+me.city)
      ),
      R(Btn,{onClick:doEncounter,v:'p',full:true,busy,s:{padding:'1rem'}},'Zaznamenať (+1 bod)')
    )
  );

  // ══ SKUPINY ═══════════════════════════════════════════════
  if(scr==='team')return R('div',null,
    R(Bk,{to:'home',set:setScr,l:'Späť'}),
    R(Fl,{msg:flash}),
    R('div',{style:S.eye},'Moje skupiny'),
    R('h3',{style:{...S.h,fontSize:'1.6rem'}},'Malé ',R('em',{style:S.hEm},'skupiny')),
    myTeams.length>0&&R('div',{style:{marginBottom:'1.5rem'}},
      myTeams.map(t=>{
        const bg=t.bigGroupId?bigGroups[t.bigGroupId]:null;
        const isActive=activeTeamId===t.id;
        const isFounder=t.founderId===me.uid;
        return R('div',{key:t.id,style:{...S.card,marginBottom:'.75rem',
          ...(isActive?{borderColor:'#C4603A'}:{})}},
          R('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:'.5rem'}},
            R('div',null,
              R('div',{style:{fontFamily:"'Syne',sans-serif",fontWeight:500,color:'#FAF5EF',fontSize:'.95rem'}},
                t.name,isFounder&&R('span',{style:{...S.badge,marginLeft:'.5rem',fontSize:'.55rem'}},'zakladateľ')),
              bg&&R('div',{style:{fontFamily:"'DM Mono',monospace",fontSize:'.6rem',color:'rgba(184,136,42,0.8)',marginTop:'.2rem'}},
                '↳ '+bg.name+(bg.category?' · '+bg.category:'')),
              R('div',{style:{fontFamily:"'DM Mono',monospace",fontSize:'.6rem',color:'rgba(250,245,239,0.3)',marginTop:'.15rem'}},
                'Kód: '+t.code+' · '+(t.members||[]).length+' členov · '+(t.points||0)+' bodov')
            ),
            R('div',{style:{display:'flex',gap:'.4rem',flexDirection:'column',alignItems:'flex-end'}},
              R(Btn,{onClick:()=>setActiveTeamId(t.id),v:isActive?'g':'m',s:{fontSize:'.65rem',padding:'.3rem .7rem'}},
                isActive?'✓ Aktívna':'Nastaviť aktívnu'),
              isFounder&&!t.bigGroupId&&R(Btn,{
                onClick:()=>setScr('biggroup_'+t.id),v:'m',
                s:{fontSize:'.65rem',padding:'.3rem .7rem',borderColor:'rgba(184,136,42,0.3)',color:'rgba(184,136,42,0.8)'}},'+ Veľká skupina'),
              R(Btn,{onClick:()=>doLeaveTeam(t.id),v:'m',
                s:{fontSize:'.65rem',padding:'.3rem .7rem',color:'rgba(196,96,58,0.5)'}},'Opustiť')
            )
          )
        );
      })
    ),
    // Moje veľké skupiny
    R('div',{style:{...S.lbl,marginBottom:'1rem',marginTop:'1.5rem'}},'Veľké skupiny'),
    R('div',{style:{marginBottom:'1.5rem'}},
      // BigGroups where I'm founder (via my teams)
      (()=>{
        const myBgIds=new Set();
        myTeams.forEach(t=>{if(t.bigGroupId)myBgIds.add(t.bigGroupId);});
        // Also biggroups I joined directly
        ((me.bigGroupIds)||[]).forEach(id=>myBgIds.add(id));
        const myBgList=[...myBgIds].map(id=>bigGroups[id]).filter(Boolean);
        if(myBgList.length===0) return R('div',{style:{fontFamily:"'DM Mono',monospace",
          fontSize:'.7rem',color:'rgba(250,245,239,0.22)',padding:'.5rem 0'}},
          'Zatiaľ nie si v žiadnej veľkej skupine.');
        return R('div',{style:{display:'flex',flexDirection:'column',gap:'.5rem'}},
          myBgList.map(bg=>{
            const isFounder=bg.founderId===me.uid;
            const parent=bg.parentId?bigGroups[bg.parentId]:null;
            return R('div',{key:bg.id,style:{...S.card,marginBottom:0,
              padding:'1rem 1.25rem',cursor:'pointer'},
              onClick:()=>setScr('manage_bg_'+bg.id)},
              R('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}},
                R('div',null,
                  R('div',{style:{fontFamily:"'Syne',sans-serif",fontWeight:500,
                    color:'#FAF5EF',fontSize:'.9rem',marginBottom:'.2rem'}},
                    bg.name,isFounder&&R('span',{style:{...S.badge,marginLeft:'.5rem',
                      fontSize:'.55rem'}},'zakladateľ')),
                  parent&&R('div',{style:{fontFamily:"'DM Mono',monospace",fontSize:'.6rem',
                    color:'rgba(184,136,42,0.7)',marginBottom:'.15rem'}},'↳ '+parent.name),
                  R('div',{style:{fontFamily:"'DM Mono',monospace",fontSize:'.6rem',
                    color:'rgba(250,245,239,0.28)'}},
                    bg.category+(bg.type?' · '+bg.type:'')+' · '+bg.points+' bodov')
                ),
                R('span',{style:{fontFamily:"'DM Mono',monospace",fontSize:'.6rem',
                  color:'rgba(250,245,239,0.35)',marginTop:'.15rem'}},'Spravovať →')
              )
            );
          })
        );
      })(),
      // Join biggroup directly by code
      R('div',{style:{marginTop:'1rem'}},
        R(Btn,{onClick:()=>setScr('join_bg_direct'),v:'m',
          s:{fontSize:'.7rem',width:'100%'}},'+ Pripojiť sa ku veľkej skupine kódom')
      )
    ),

    R('div',{style:{...S.lbl,marginBottom:'.75rem'}},'Malé skupiny'),
    R('div',{style:{display:'flex',borderBottom:'1px solid rgba(250,245,239,0.1)',marginBottom:'1.25rem'}},
      R('button',{onClick:()=>setTtab('create'),style:ttab==='create'?S.tabA:S.tab},'Vytvoriť malú skupinu'),
      R('button',{onClick:()=>setTtab('join'),style:ttab==='join'?S.tabA:S.tab},'Pripojiť sa kódom')
    ),
    te&&R(Err,{m:te}),
    ttab==='create'?R('div',{style:S.card},
      R('div',{style:{fontSize:'.85rem',color:'rgba(250,245,239,0.5)',marginBottom:'1rem',lineHeight:1.6}},
        'Malá skupina má 5–8 ľudí. Môžeš byť v niekoľkých súčasne.'),
      R(Lbl,{c:'Názov malej skupiny'}),
      R(Inp,{val:tName,set:setTName,ph:'napr. Partiička zo schodov',onEnter:doCreateTeam,mb0:true}),
      R(Btn,{onClick:doCreateTeam,v:'p',full:true,busy,s:{marginTop:'1rem'}},'Vytvoriť')
    ):R('div',{style:S.card},
      R(Lbl,{c:'Kód skupiny'}),
      R(Inp,{val:tCode,set:v=>setTCode(v.toUpperCase()),ph:'napr. AB3X7K',mono:true,mb0:true}),
      R(Btn,{onClick:doJoinTeam,v:'p',full:true,busy,s:{marginTop:'1rem'}},'Pripojiť sa')
    )
  );

  // ══ REBRÍČEK ═════════════════════════════════════════════
  if(scr==='lb'){
    // Geo leaderboards derived from players
    const cityMap={},regionMap={},stateMap={},globalTotal={pts:0,players:0};
    Object.values(players).forEach(p=>{
      if(p.city){const k=p.city;cityMap[k]=(cityMap[k]||{name:k,points:0,players:0});cityMap[k].points+=p.points||0;cityMap[k].players++;}
      if(p.region||p.city){const k=p.region||p.city;regionMap[k]=(regionMap[k]||{name:k,points:0,players:0});regionMap[k].points+=p.points||0;regionMap[k].players++;}
      if(p.country){const k=p.country;stateMap[k]=(stateMap[k]||{name:k,points:0,players:0});stateMap[k].points+=p.points||0;stateMap[k].players++;}
      globalTotal.pts+=p.points||0;globalTotal.players++;
    });
    const sCities=Object.values(cityMap).sort((a,b)=>b.points-a.points);
    const sRegions=Object.values(regionMap).sort((a,b)=>b.points-a.points);
    const sStates=Object.values(stateMap).sort((a,b)=>b.points-a.points);

    const geoTabs=[
      {id:'city',label:'Mestá'},
      {id:'region',label:'Kraje'},
      {id:'state',label:'Štáty'},
      {id:'global',label:'Svet'},
    ];
    const groupTabs=[
      {id:'ind',label:'Jednotlivci'},
      {id:'small',label:'Malé skupiny'},
      {id:'big',label:'Veľké skupiny'},
    ];
    const isGeoTab=['city','region','state','global'].includes(lbTab);

    const emptyRow=(msg)=>R('div',{style:{fontFamily:"'DM Mono',monospace",fontSize:'.75rem',color:'rgba(250,245,239,0.22)',padding:'2rem 0',textAlign:'center'}},msg);
    const geoRow=(item,i,myName)=>R('div',{key:item.name,style:{...S.row,borderColor:'rgba(250,245,239,0.07)'}},
      R(RankBadge,{i}),
      R('div',{style:{flex:1}},
        R('div',{style:{fontWeight:item.name===myName?500:400,color:'rgba(250,245,239,'+(item.name===myName?.92:.68)+')'}},
          item.name,item.name===myName&&R('span',{style:{...S.badgeA,marginLeft:'.5rem',fontSize:'.55rem'}},'ty')),
        R('div',{style:{fontFamily:"'DM Mono',monospace",fontSize:'.6rem',color:'rgba(250,245,239,0.28)',marginTop:'.1rem'}},
          item.players+' hráčov')
      ),
      R('span',{style:S.pt},item.points)
    );

    return R('div',null,
      R(Bk,{to:'home',set:setScr,l:'Späť'}),
      R('div',{style:{display:'flex',alignItems:'center',gap:'.75rem',marginBottom:'1.5rem'}},
        R('div',{style:S.eye},'Rebríček'),fbBadge),
      R('h3',{style:{...S.h,fontSize:'1.6rem'}},'Kto ',R('em',{style:S.hEm},'vedie?')),

      // Tab groups
      R('div',{style:{marginBottom:'1.5rem'}},
        R('div',{style:{fontFamily:"'DM Mono',monospace",fontSize:'.55rem',letterSpacing:'.12em',color:'rgba(250,245,239,0.3)',textTransform:'uppercase',marginBottom:'.4rem'}},'Skupiny'),
        R('div',{style:{display:'flex',borderBottom:'1px solid rgba(250,245,239,0.1)',marginBottom:'.75rem',flexWrap:'wrap'}},
          groupTabs.map(t=>R('button',{key:t.id,onClick:()=>setLbTab(t.id),style:lbTab===t.id?S.tabA:S.tab},t.label))
        ),
        R('div',{style:{fontFamily:"'DM Mono',monospace",fontSize:'.55rem',letterSpacing:'.12em',color:'rgba(250,245,239,0.3)',textTransform:'uppercase',marginBottom:'.4rem'}},'Geografické'),
        R('div',{style:{display:'flex',borderBottom:'1px solid rgba(250,245,239,0.1)',flexWrap:'wrap'}},
          geoTabs.map(t=>R('button',{key:t.id,onClick:()=>setLbTab(t.id),style:lbTab===t.id?S.tabA:S.tab},t.label))
        )
      ),

      // Category filter for big groups
      lbTab==='big'&&R('div',{style:{marginBottom:'1rem'}},
        R('div',{style:{display:'flex',flexWrap:'wrap',gap:'.3rem'}},
          R('button',{style:!lbCatFilter?S.typeChipA:S.typeChip,onClick:()=>setLbCatFilter('')},'Všetky'),
          categories.map(c=>R('button',{key:c.id,
            style:lbCatFilter===c.id?S.typeChipA:S.typeChip,
            onClick:()=>setLbCatFilter(lbCatFilter===c.id?'':c.id)},c.label))
        )
      ),

      // INDIVIDUAL
      lbTab==='ind'&&(sPlayers.length===0?emptyRow('Ešte žiadni hráči.')
        :sPlayers.map((p,i)=>R('div',{key:p.uid||p.nickname,style:{...S.row,borderColor:'rgba(250,245,239,0.07)'}},
          R(RankBadge,{i}),
          R('div',{style:{flex:1}},
            R('div',{style:{fontWeight:p.uid===me.uid?500:400,color:'rgba(250,245,239,'+(p.uid===me.uid?.92:.68)+')'}},
              p.nickname,p.uid===me.uid&&R('span',{style:{...S.badgeA,marginLeft:'.5rem',fontSize:'.55rem'}},'ty')),
            R('div',{style:{fontFamily:"'DM Mono',monospace",fontSize:'.6rem',color:'rgba(250,245,239,0.28)',marginTop:'.1rem'}},
              p.city+(p.country?', '+p.country:''))
          ),
          R('span',{style:S.pt},p.points||0)))),

      // SMALL GROUPS
      lbTab==='small'&&(sTeams.length===0?emptyRow('Ešte žiadne malé skupiny.')
        :sTeams.map((t,i)=>R('div',{key:t.id,style:{...S.row,borderColor:'rgba(250,245,239,0.07)'}},
          R(RankBadge,{i}),
          R('div',{style:{flex:1}},
            R('div',{style:{fontWeight:myTeamIds.includes(t.id)?500:400,color:'rgba(250,245,239,'+(myTeamIds.includes(t.id)?.92:.68)+')'}},
              t.name,myTeamIds.includes(t.id)&&R('span',{style:{...S.badgeA,marginLeft:'.5rem',fontSize:'.55rem'}},'tvoja')),
            R('div',{style:{fontFamily:"'DM Mono',monospace",fontSize:'.6rem',color:'rgba(250,245,239,0.28)',marginTop:'.1rem'}},
              (t.members||[]).length+' členov',
              t.bigGroupId&&bigGroups[t.bigGroupId]&&' · '+bigGroups[t.bigGroupId].name)
          ),
          R('span',{style:S.pt},t.points||0)))),

      // BIG GROUPS
      lbTab==='big'&&(sBigGroups.length===0
        ?emptyRow(lbCatFilter?'Žiadne skupiny v tejto kategórii.':'Ešte žiadne veľké skupiny.')
        :sBigGroups.map((bg,i)=>R('div',{key:bg.id,style:{...S.row,borderColor:'rgba(250,245,239,0.07)'}},
          R(RankBadge,{i}),
          R('div',{style:{flex:1}},
            R('div',{style:{color:'rgba(250,245,239,0.85)',fontWeight:500}},bg.name,
              bg.parentId&&bigGroups[bg.parentId]&&R('span',{style:{fontFamily:"'DM Mono',monospace",fontSize:'.55rem',color:'rgba(250,245,239,0.3)',marginLeft:'.5rem'}},'↑ '+bigGroups[bg.parentId].name)),
            R('div',{style:{fontFamily:"'DM Mono',monospace",fontSize:'.6rem',color:'rgba(250,245,239,0.28)',marginTop:'.1rem'}},
              bg.category+(bg.type?' · '+bg.type:'')+' · '+(bg.teamIds||[]).length+' malých skupín')
          ),
          R('span',{style:S.pt},bg.points||0)))),

      // CITIES
      lbTab==='city'&&(sCities.length===0?emptyRow('Žiadne mestá ešte.')
        :sCities.map((item,i)=>geoRow(item,i,me.city))),

      // REGIONS
      lbTab==='region'&&(sRegions.length===0?emptyRow('Žiadne kraje ešte.')
        :sRegions.map((item,i)=>geoRow(item,i,me.region||me.city))),

      // STATES
      lbTab==='state'&&(sStates.length===0?emptyRow('Žiadne štáty ešte.')
        :sStates.map((item,i)=>geoRow(item,i,me.country))),

      // GLOBAL
      lbTab==='global'&&R('div',null,
        R('div',{style:{...S.cardGold,textAlign:'center',padding:'2rem'}},
          R('div',{style:{fontFamily:"'Cormorant Garamond',Georgia,serif",fontSize:'3.5rem',fontWeight:600,color:'#B8882A',lineHeight:1}},globalTotal.pts),
          R('div',{style:{fontFamily:"'DM Mono',monospace",fontSize:'.6rem',letterSpacing:'.12em',color:'rgba(250,245,239,0.35)',textTransform:'uppercase',marginTop:'.5rem'}},'Celkové body · Svet'),
          R('div',{style:{fontFamily:"'DM Mono',monospace",fontSize:'.7rem',color:'rgba(250,245,239,0.45)',marginTop:'.75rem'}},
            globalTotal.players+' hráčov z '+Object.keys(stateMap).length+' štátov'),
          R('div',{style:{marginTop:'1.25rem',fontFamily:"'DM Mono',monospace",fontSize:'.65rem',color:'rgba(184,136,42,0.6)'}},
            'Cieľ: 50 % hrajúcej populácie sveta')
        )
      )
    );
  }

  return null;
}

const root=document.getElementById('game-root');
if(root)ReactDOM.createRoot(root).render(R(App,null));

</script>
</body>
</html>
