<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin · Hra proti samote</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Syne:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{background:#0E0B07;color:#FAF5EF;font-family:'Syne',sans-serif;min-height:100vh;}
  .nav{background:#0E0B07;border-bottom:1px solid rgba(250,245,239,0.1);
    display:flex;align-items:center;justify-content:space-between;padding:.85rem 1.5rem;
    position:sticky;top:0;z-index:10;}
  .nav-logo{font-family:'Cormorant Garamond',serif;font-size:1.1rem;font-weight:600;color:#C4603A;text-decoration:none;}
  .nav-back{font-family:'DM Mono',monospace;font-size:.65rem;letter-spacing:.1em;color:rgba(250,245,239,0.35);
    text-decoration:none;text-transform:uppercase;}
  .main{max-width:800px;margin:0 auto;padding:2rem 1.5rem 4rem;}
  .card{background:rgba(250,245,239,0.05);border:1px solid rgba(250,245,239,0.1);padding:1.5rem 1.75rem;margin-bottom:1rem;}
  .card-warn{background:rgba(184,136,42,0.08);border:1px solid rgba(184,136,42,0.3);padding:1.5rem 1.75rem;margin-bottom:1rem;}
  .card-ok{background:rgba(184,136,42,0.06);border:1px solid rgba(184,136,42,0.25);padding:1.5rem 1.75rem;margin-bottom:1rem;}
  .eye{font-family:'DM Mono',monospace;font-size:.65rem;letter-spacing:.15em;text-transform:uppercase;color:#C4603A;margin-bottom:.75rem;}
  .h{font-family:'Cormorant Garamond',serif;font-size:1.9rem;font-weight:600;color:#FAF5EF;margin-bottom:1.5rem;line-height:1.1;}
  .h em{font-style:italic;color:#C4603A;}
  .lbl{font-family:'DM Mono',monospace;font-size:.6rem;letter-spacing:.15em;color:rgba(250,245,239,.38);text-transform:uppercase;display:block;margin-bottom:.4rem;}
  .mono{font-family:'DM Mono',monospace;}
  .row{display:flex;align-items:center;gap:.75rem;padding:.85rem 0;border-bottom:1px solid rgba(250,245,239,0.07);}
  .badge{font-family:'DM Mono',monospace;font-size:.6rem;letter-spacing:.08em;padding:.2rem .55rem;border:1px solid rgba(250,245,239,0.18);color:rgba(250,245,239,.48);}
  .badge-warn{font-family:'DM Mono',monospace;font-size:.6rem;padding:.2rem .55rem;background:#B8882A;color:#FAF5EF;}
  .badge-ok{font-family:'DM Mono',monospace;font-size:.6rem;padding:.2rem .55rem;background:rgba(184,136,42,0.3);color:#FAF5EF;}
  .btn{padding:.65rem 1.25rem;border:none;font-family:'Syne',sans-serif;font-size:.8rem;font-weight:500;
    letter-spacing:.08em;text-transform:uppercase;cursor:pointer;border-radius:0;}
  .btn-p{background:#8B2E14;color:#FAF5EF;}
  .btn-g{background:#B8882A;color:#FAF5EF;}
  .btn-d{background:rgba(139,46,20,0.25);color:rgba(196,96,58,0.8);border:1px solid rgba(196,96,58,0.25);}
  .btn-m{background:transparent;color:rgba(250,245,239,.42);border:1px solid rgba(250,245,239,0.14);}
  .inp{width:100%;padding:.7rem 1rem;border:1px solid rgba(250,245,239,0.18);background:rgba(250,245,239,0.05);
    font-size:.9rem;color:#FAF5EF;outline:none;font-family:'Syne',sans-serif;border-radius:0;margin-bottom:.75rem;}
  .tabs{display:flex;border-bottom:1px solid rgba(250,245,239,0.1);margin-bottom:1.5rem;}
  .tab{padding:.6rem 1rem;font-size:.8rem;cursor:pointer;color:rgba(250,245,239,.38);
    background:none;border:none;border-bottom:2px solid transparent;font-family:'Syne',sans-serif;}
  .tab-a{padding:.6rem 1rem;font-size:.8rem;cursor:pointer;color:#FAF5EF;
    background:none;border:none;border-bottom:2px solid #C4603A;font-family:'Syne',sans-serif;}
  .stat{background:rgba(250,245,239,0.05);border:1px solid rgba(250,245,239,0.1);padding:1rem 1.25rem;text-align:center;}
  .stat-n{font-family:'Cormorant Garamond',serif;font-size:2.5rem;font-weight:600;color:#C4603A;line-height:1;}
  .stat-l{font-family:'DM Mono',monospace;font-size:.55rem;color:rgba(250,245,239,.3);letter-spacing:.1em;text-transform:uppercase;margin-top:.25rem;}
  .grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:.75rem;margin-bottom:1.5rem;}
  .flash{background:rgba(184,136,42,0.13);border:1px solid rgba(184,136,42,0.28);padding:.75rem 1rem;
    font-family:'DM Mono',monospace;font-size:.7rem;color:#FAF5EF;letter-spacing:.05em;margin-bottom:1rem;}
  .divider{border-top:1px solid rgba(250,245,239,0.1);margin:1.25rem 0;}
  .empty{font-family:'DM Mono',monospace;font-size:.75rem;color:rgba(250,245,239,0.22);padding:2rem 0;text-align:center;}
  footer{border-top:1px solid rgba(250,245,239,0.08);padding:1.5rem;
    display:flex;justify-content:space-between;font-family:'DM Mono',monospace;
    font-size:.65rem;color:rgba(250,245,239,.22);}
  #access-denied{display:none;padding:3rem 1.5rem;text-align:center;}
</style>
</head>
<body>

<nav class="nav">
  <a class="nav-logo" href="admin.html">Admin Panel</a>
  <a class="nav-back" href="game.html">← Späť do hry</a>
</nav>

<div id="access-denied">
  <div class="eye">Prístup odmietnutý</div>
  <div style="font-family:'Cormorant Garamond',serif;font-size:1.6rem;color:#FAF5EF;margin-bottom:1rem;">
    Táto stránka je len pre administrátora.
  </div>
  <a href="game.html" style="font-family:'DM Mono',monospace;font-size:.8rem;color:#C4603A;">← Späť do hry</a>
</div>

<main class="main" id="admin-content" style="display:none;">
  <div id="flash" class="flash" style="display:none;"></div>

  <div class="eye">Admin panel</div>
  <h2 class="h">Správa <em>hry</em></h2>

  <!-- Overview stats -->
  <div class="grid3" id="stats">
    <div class="stat"><div class="stat-n" id="stat-players">—</div><div class="stat-l">Hráči</div></div>
    <div class="stat"><div class="stat-n" id="stat-teams">—</div><div class="stat-l">Malé skupiny</div></div>
    <div class="stat"><div class="stat-n" id="stat-biggroups">—</div><div class="stat-l">Veľké skupiny</div></div>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab-a" onclick="switchTab('pending')">Čakajúce kategórie</button>
    <button class="tab" onclick="switchTab('categories')">Všetky kategórie</button>
    <button class="tab" onclick="switchTab('groups')">Veľké skupiny</button>
    <button class="tab" onclick="switchTab('players')">Hráči</button>
  </div>

  <!-- PENDING CATEGORIES -->
  <div id="tab-pending">
    <div class="lbl" style="margin-bottom:1rem;">Čakajú na schválenie</div>
    <div id="pending-list"></div>
  </div>

  <!-- ALL CATEGORIES -->
  <div id="tab-categories" style="display:none;">
    <div class="lbl" style="margin-bottom:1rem;">Všetky aktívne kategórie</div>
    <div id="categories-list"></div>
  </div>

  <!-- GROUPS -->
  <div id="tab-groups" style="display:none;">
    <div class="lbl" style="margin-bottom:1rem;">Veľké skupiny</div>
    <div id="groups-list"></div>
  </div>

  <!-- PLAYERS -->
  <div id="tab-players" style="display:none;">
    <div class="lbl" style="margin-bottom:1rem;">Hráči</div>
    <div id="players-list"></div>
  </div>
</main>

<footer>
  <span>Admin · Hra proti samote</span>
  <span id="admin-email-display"></span>
</footer>

<script>
// ── Config ────────────────────────────────────────────────────
const FB_API_KEY = 'VLOZ_API_KEY';
const FB_DB_URL  = 'https://VLOZ-default-rtdb.europe-west1.firebasedatabase.app';
const USE_FIREBASE = FB_API_KEY !== 'VLOZ_API_KEY';
const ADMIN_EMAIL = 'filip.halecka@gmail.com';

const DEFAULT_CATEGORIES = [
  { id:'skolstvo', label:'Školstvo',  types:['Trieda','Škola','Univerzita'] },
  { id:'skauting', label:'Skauting',  types:['Oddiel','Zbor','Oblasť'] },
  { id:'cirkev',   label:'Cirkev',    types:['Farnosť','Diecéza'] },
  { id:'sport',    label:'Šport',     types:['Tím','Klub'] },
  { id:'praca',    label:'Práca',     types:['Oddelenie','Firma'] },
  { id:'ine',      label:'Iné',       types:[] },
];

// ── localStorage helpers ──────────────────────────────────────
function lsGet(k){try{const v=localStorage.getItem(k);return v?JSON.parse(v):null;}catch{return null;}}
function lsSet(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}

// ── DB ────────────────────────────────────────────────────────
function getToken(){const s=lsGet('hps:session');return s?s.idToken:null;}
async function dbGet(path){
  const tok=getToken();
  const r=await fetch(FB_DB_URL+'/'+path+'.json'+(tok?'?auth='+tok:''));
  return await r.json();
}
async function dbPut(path,data){
  const tok=getToken();
  await fetch(FB_DB_URL+'/'+path+'.json'+(tok?'?auth='+tok:''),{
    method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)});
}
async function dbPatch(path,data){
  const tok=getToken();
  await fetch(FB_DB_URL+'/'+path+'.json'+(tok?'?auth='+tok:''),{
    method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)});
}

// ── State ─────────────────────────────────────────────────────
let allPlayers={}, allTeams={}, allBigGroups={}, allCategories={};
let currentTab='pending';

// ── Access check ──────────────────────────────────────────────
function checkAccess(){
  const sess=lsGet('hps:session');
  if(!sess||sess.email!==ADMIN_EMAIL){
    document.getElementById('access-denied').style.display='block';
    return false;
  }
  document.getElementById('admin-content').style.display='block';
  document.getElementById('admin-email-display').textContent=sess.email;
  return true;
}

// ── Flash ─────────────────────────────────────────────────────
function showFlash(msg){
  const el=document.getElementById('flash');
  el.textContent=msg;el.style.display='block';
  setTimeout(()=>el.style.display='none',3000);
}

// ── Load data ─────────────────────────────────────────────────
async function loadAll(){
  if(USE_FIREBASE){
    try{
      const[pl,tm,bg,cats]=await Promise.all([
        dbGet('players'),dbGet('teams'),dbGet('biggroups'),dbGet('categories')
      ]);
      allPlayers=pl||{};allTeams=tm||{};allBigGroups=bg||{};allCategories=cats||{};
    }catch(e){console.error(e);}
  } else {
    allPlayers=lsGet('hps:players')||{};
    allTeams=lsGet('hps:teams')||{};
    allBigGroups=lsGet('hps:biggroups')||{};
    allCategories=lsGet('hps:categories')||{};
  }
  updateStats();
  renderCurrentTab();
}

function updateStats(){
  document.getElementById('stat-players').textContent=Object.keys(allPlayers).length;
  document.getElementById('stat-teams').textContent=Object.keys(allTeams).length;
  document.getElementById('stat-biggroups').textContent=Object.keys(allBigGroups).length;
}

// ── Tab switching ─────────────────────────────────────────────
function switchTab(tab){
  currentTab=tab;
  document.querySelectorAll('.tab,.tab-a').forEach(b=>{
    b.className=b.getAttribute('onclick').includes("'"+tab+"'")?'tab-a':'tab';
  });
  ['pending','categories','groups','players'].forEach(t=>{
    document.getElementById('tab-'+t).style.display=t===tab?'block':'none';
  });
  renderCurrentTab();
}

function renderCurrentTab(){
  if(currentTab==='pending') renderPending();
  else if(currentTab==='categories') renderCategories();
  else if(currentTab==='groups') renderGroups();
  else if(currentTab==='players') renderPlayers();
}

// ── Pending categories ────────────────────────────────────────
function renderPending(){
  const pending=Object.values(allCategories).filter(c=>!c.approved);
  const el=document.getElementById('pending-list');
  if(pending.length===0){el.innerHTML='<div class="empty">Žiadne čakajúce návrhy. 🎉</div>';return;}
  el.innerHTML=pending.map(c=>`
    <div class="card" id="pend-${c.id}">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:.75rem;">
        <div>
          <div style="font-family:'Syne',sans-serif;font-weight:500;font-size:1rem;color:#FAF5EF;margin-bottom:.3rem;">${c.label}</div>
          <div class="mono" style="font-size:.6rem;color:rgba(250,245,239,.35);">
            Typy: ${c.types&&c.types.length>0?c.types.join(', '):'—'}
          </div>
          <div class="mono" style="font-size:.6rem;color:rgba(250,245,239,.25);margin-top:.2rem;">
            Navrhol: ${c.requestedByEmail||'—'} · ${c.ts?new Date(c.ts).toLocaleDateString('sk-SK'):'—'}
          </div>
        </div>
        <span class="badge-warn">čaká</span>
      </div>
      <div style="display:flex;gap:.5rem;">
        <button class="btn btn-g" onclick="approveCategory('${c.id}')">✓ Schváliť</button>
        <button class="btn btn-d" onclick="rejectCategory('${c.id}')">✗ Zamietnuť</button>
      </div>
    </div>
  `).join('');
}

async function approveCategory(id){
  if(!confirm('Schváliť kategóriu?')) return;
  if(USE_FIREBASE){
    await dbPatch('categories/'+id,{approved:true});
  } else {
    const c=lsGet('hps:categories')||{};if(c[id])c[id].approved=true;lsSet('hps:categories',c);
  }
  allCategories[id].approved=true;
  showFlash('Kategória schválená ✓');
  renderPending();
}

async function rejectCategory(id){
  if(!confirm('Zamietnuť a zmazať návrh?')) return;
  if(USE_FIREBASE){
    await dbPut('categories/'+id,null);
  } else {
    const c=lsGet('hps:categories')||{};delete c[id];lsSet('hps:categories',c);
  }
  delete allCategories[id];
  showFlash('Kategória zamietnutá.');
  renderPending();
}

// ── All categories ────────────────────────────────────────────
function renderCategories(){
  const defaults=DEFAULT_CATEGORIES;
  const custom=Object.values(allCategories).filter(c=>c.approved);
  const el=document.getElementById('categories-list');
  const all=[
    ...defaults.map(c=>({...c,isDefault:true})),
    ...custom.map(c=>({...c,isDefault:false}))
  ];
  el.innerHTML=`
    <div style="margin-bottom:1rem;">
      ${all.map(c=>`
        <div class="row">
          <div style="flex:1;">
            <div style="font-weight:500;color:rgba(250,245,239,.88);">${c.label}</div>
            <div class="mono" style="font-size:.6rem;color:rgba(250,245,239,.3);margin-top:.15rem;">
              ${c.types&&c.types.length>0?c.types.join(' · '):'(bez typov)'}
            </div>
          </div>
          <span class="${c.isDefault?'badge':'badge-ok'}">${c.isDefault?'zabudovaná':'schválená'}</span>
        </div>
      `).join('')}
    </div>
    <div class="divider"></div>
    <div class="lbl" style="margin-bottom:.5rem;">Pridať typ do existujúcej kategórie</div>
    <div style="display:flex;gap:.5rem;margin-bottom:1rem;">
      <select id="cat-sel" style="flex:1;padding:.6rem .8rem;background:#1a1610;border:1px solid rgba(250,245,239,.18);color:#FAF5EF;font-family:'Syne',sans-serif;font-size:.85rem;">
        ${defaults.map(c=>`<option value="${c.id}">${c.label}</option>`).join('')}
        ${custom.map(c=>`<option value="${c.id}">${c.label}</option>`).join('')}
      </select>
      <input id="new-type" class="inp" placeholder="Nový typ (napr. Gymnázium)" style="flex:1;margin:0;">
      <button class="btn btn-p" onclick="addTypeToCategory()">Pridať</button>
    </div>
  `;
}

async function addTypeToCategory(){
  const catId=document.getElementById('cat-sel').value;
  const newType=document.getElementById('new-type').value.trim();
  if(!newType){showFlash('Zadaj názov typu.');return;}
  // Find in defaults or custom
  const defCat=DEFAULT_CATEGORIES.find(c=>c.id===catId);
  if(defCat){
    showFlash('Zabudované kategórie nie je možné upravovať tu. Uprav kód (DEFAULT_CATEGORIES).');
    return;
  }
  if(allCategories[catId]){
    const types=[...(allCategories[catId].types||[]),newType];
    if(USE_FIREBASE) await dbPatch('categories/'+catId,{types});
    else{const c=lsGet('hps:categories')||{};if(c[catId])c[catId].types=types;lsSet('hps:categories',c);}
    allCategories[catId].types=types;
    showFlash('Typ pridaný ✓');
    renderCategories();
  }
}

// ── Big groups ────────────────────────────────────────────────
function renderGroups(){
  const groups=Object.values(allBigGroups).sort((a,b)=>b.points-a.points);
  const el=document.getElementById('groups-list');
  if(groups.length===0){el.innerHTML='<div class="empty">Žiadne veľké skupiny.</div>';return;}
  el.innerHTML=groups.map(g=>`
    <div class="row" style="align-items:flex-start;padding:.9rem 0;">
      <div style="flex:1;">
        <div style="font-weight:500;color:rgba(250,245,239,.88);margin-bottom:.2rem;">${g.name}
          ${g.active===false?'<span style="font-family:'DM Mono',monospace;font-size:.55rem;padding:.15rem .45rem;background:rgba(184,136,42,0.15);border:1px solid rgba(184,136,42,0.3);color:#B8882A;margin-left:.5rem;">VYPNUTÁ</span>':''}
        </div>
        <div class="mono" style="font-size:.6rem;color:rgba(250,245,239,.3);margin-top:.1rem;">
          ${g.category||'—'}${g.type?' · '+g.type:''} · ${(g.teamIds||[]).length} malých skupín · Kód: ${g.code}
          ${g.parentId?(' · ↑ nadradená: '+(allBigGroups[g.parentId]?.name||g.parentId)):''}
        </div>
      </div>
      <div style="display:flex;gap:.4rem;align-items:center;flex-shrink:0;">
        <span style="font-family:'DM Mono',monospace;font-size:1rem;font-weight:500;color:#B8882A;">${g.points||0}</span>
        <button class="btn btn-m" style="padding:.3rem .6rem;font-size:.65rem;" onclick="toggleBigGroup('${g.id}')">${g.active===false?'▶ Zapnúť':'⏸ Vypnúť'}</button>
        <button class="btn btn-d" style="padding:.3rem .6rem;font-size:.65rem;" onclick="deleteBigGroup('${g.id}')">🗑</button>
      </div>
    </div>
  `).join('');
}

// ── BigGroup admin actions ───────────────────────────────────────────────────
async function toggleBigGroup(id){
  const cur=allBigGroups[id];if(!cur)return;
  const newActive=cur.active===false;
  if(USE_FIREBASE){try{await dbPatch('biggroups/'+id,{active:newActive});}catch(e){showFlash('Chyba: '+e.message);return;}}
  else{const bg=lsGet('hps:biggroups')||{};if(bg[id])bg[id].active=newActive;lsSet('hps:biggroups',bg);}
  allBigGroups[id].active=newActive;
  showFlash(newActive?'Skupina zapnutá ✓':'Skupina vypnutá.');renderGroups();
}

async function deleteBigGroup(id){
  const name=allBigGroups[id]?.name||id;
  if(!confirm('Naozaj zmazať skupinu "'+name+'"? Táto akcia je nevratná.'))return;
  if(USE_FIREBASE){
    try{
      const allBg=await dbGet('biggroups')||{};
      for(const [gid,g] of Object.entries(allBg)){
        if(g.parentId===id) await dbPatch('biggroups/'+gid,{parentId:null});
      }
      const allTm=await dbGet('teams')||{};
      for(const [tid,t] of Object.entries(allTm)){
        if(t.bigGroupId===id) await dbPatch('teams/'+tid,{bigGroupId:null});
      }
      await dbPut('biggroups/'+id,null);
    }catch(e){showFlash('Chyba: '+e.message);return;}
  } else {
    const bg=lsGet('hps:biggroups')||{};
    Object.values(bg).forEach(g=>{if(g.parentId===id)g.parentId=null;});
    delete bg[id];lsSet('hps:biggroups',bg);
  }
  delete allBigGroups[id];
  showFlash('Skupina "'+name+'" zmazaná ✓');
  await loadAll();
}

// ── Players ───────────────────────────────────────────────────
function renderPlayers(){
  const players=Object.values(allPlayers).sort((a,b)=>b.points-a.points);
  const el=document.getElementById('players-list');
  if(players.length===0){el.innerHTML='<div class="empty">Žiadni hráči.</div>';return;}
  el.innerHTML=`
    <div style="margin-bottom:.5rem;display:grid;grid-template-columns:1fr 1fr 80px 60px;gap:.5rem;">
      <div class="lbl" style="margin:0;">Prezývka</div>
      <div class="lbl" style="margin:0;">E-mail / Mesto</div>
      <div class="lbl" style="margin:0;">Tímy</div>
      <div class="lbl" style="margin:0;">Body</div>
    </div>
    ${players.map(p=>`
      <div style="display:grid;grid-template-columns:1fr 1fr 80px 60px;gap:.5rem;padding:.6rem 0;border-bottom:1px solid rgba(250,245,239,0.06);">
        <div style="font-weight:500;color:rgba(250,245,239,.88);font-size:.9rem;">${p.nickname}</div>
        <div>
          <div class="mono" style="font-size:.65rem;color:rgba(250,245,239,.4);">${p.email||'—'}</div>
          <div class="mono" style="font-size:.6rem;color:rgba(250,245,239,.25);">${p.city||''}${p.country?', '+p.country:''}</div>
        </div>
        <div class="mono" style="font-size:.7rem;color:rgba(250,245,239,.4);">${(p.teamIds||[]).length}</div>
        <div class="mono" style="font-size:1rem;font-weight:500;color:#B8882A;">${p.points||0}</div>
      </div>
    `).join('')}
  `;
}

// ── Init ──────────────────────────────────────────────────────
if(checkAccess()){
  loadAll();
  // Refresh every 30s
  setInterval(loadAll, 30000);
}
</script>
</body>
</html>
